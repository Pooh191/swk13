<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="16x16" href="SWK-LogoNoBG.png">
    <title>มัธยมศึกษาปีที่2/13 | เข้าสู่ระบบ </title>
    <link rel="stylesheet" href="style-login.css">
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="ใส่เลขประจำตัว" required>
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="ใส่เลขประจำตัว" required>
            
            <button type="submit">Login</button>
        </form>
    </div>
    <script src="scripts-login.js"></script>
</body>
</html>
