<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style-login.css">
</head>
<body>
    <div class="login-container">
        <h2>เข้าสู่ระบบ</h2>
        <form id="loginForm" action="dashbord.html" method="POST">
            <label for="username">ชื่อผู้ใช้งาน</label>
            <input type="text" id="username" name="username" placeholder="กรุณากรอกเลขประจำตัว" required>
            
            <label for="password">รหัสผ่าน</label>
            <input type="password" id="password" name="password" placeholder="กรุณากรอกเลขประจำตัว" required>
            
            <button type="submit">เข้าสู่ระบบ</button><br><br>

            <a href="index.html" style="color: #34D399;">กลับหน้าหลัก</a>
            
            <p class="error-message" id="error-message"></p>
        </form>
    </div>

    <script src="login.js"></script>

</body>
</html>
