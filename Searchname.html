<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ค้นหาผู้มีสิทธิ์เลือกตั้ง</title>
    <link rel="stylesheet" href="style.css">
    <style>
        input {
            padding: 10px;
            width: 300px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
            text-align: left;
        }
        .not-found {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>3/13</h1>
            <button id="menu-toggle" class="menu-toggle">☰</button>
            <nav>
                <ul>
                    <li><a href="dashbord.html">หน้าหลัก</a></li>
                    <li><a href="rabeb.html">ระเบียบการเลือกตั้ง</a></li>
                    <li><a href="user.html">ผู้ที่สามารถลงรับสมัครเลือกตั้งได้</a></li>
                    <li><a href="Searchname.html">ค้นหาผู้ที่มีสิทธิ์เลือกตั้ง</a></li>
                    <li><a href="coutdown.html">เลือกตั้ง</a></li>
                    <li><a href="results.html">ผลการเลือกตั้ง</a></li>
                </ul>
            </nav>
        </div>
    </header>
        
    <section>
    <h2>ค้นหาผู้มีสิทธิ์เลือกตั้ง</h2>
    <input type="text" id="searchInput" placeholder="พิมพ์ชื่อ-นามสกุล หรือ เลขประจำตัวนักเรียน">
    <button onclick="searchData()">ค้นหา</button>
    </section>

    <section>
    <div id="result"></div>
    </section>

    <footer>
        <p><b>Copyright © 2024 - <span id="currentYear"></span> มัธยมศึกษาปีที่ 3/13. สงวนลิขสิทธิ์.</b></p>
    </footer>


    <script src="scripts.js"></script>

    <script>
        async function searchData() {
            const searchValue = document.getElementById("searchInput").value.trim();
            const resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "กำลังค้นหา...";

            if (!searchValue) {
                resultDiv.innerHTML = "<p class='not-found'>กรุณากรอกข้อมูลที่ต้องการค้นหา</p>";
                return;
            }

            try {
                const response = await fetch("https://script.google.com/macros/s/AKfycbzxkLjuP7gw9YZwfxnKo0FWZWes3vCBIGrvTpzpsZOCAwV9OdTlzWyAYmAxRMebWeOn/exec"); // ใส่ลิงก์ Google Apps Script ของคุณ
                const data = await response.json();

                const found = data.find(item => item.name === searchValue || item.student_id === searchValue);

                if (found) {
                    resultDiv.innerHTML = `
                        <div class="result">
                            <p><strong>ชื่อ:</strong> ${found.name}</p>
                            <p><strong>เลขประจำตัวนักเรียน:</strong> ${found.student_id}</p>
                            <p><strong>สถานะการเลือกตั้ง:</strong> ${found.status}</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = "<p class='not-found'>ไม่พบข้อมูลในระบบ</p>";
                }
            } catch (error) {
                resultDiv.innerHTML = "<p class='not-found'>เกิดข้อผิดพลาดในการโหลดข้อมูล</p>";
                console.error("Error fetching data:", error);
            }
        }
    </script>

</body>
</html>
